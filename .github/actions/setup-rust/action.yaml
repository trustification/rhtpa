name: Setup Rust
description: Setup Rust toolchain with the project's pinned version

inputs:
  components:
    description: Comma-separated list of additional components to install (e.g. clippy, rustfmt)
    required: false
    default: ""

runs:
  using: "composite"

  steps:
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: 1.96.0
        components: ${{ inputs.components }}
        cache: false
