name: ci

on:
  push:
    branches:
      - main
      - release/**
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - main
      - release/**
      - feature/**

env:
  CARGO_TERM_COLOR: always

jobs:

  supply-chain:
    name: Supply chain audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  check:
    name: Check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-24.04
          - macos-15
        include:
          - os: windows-2025
            install: |
              git config --system core.longpaths true
              echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
              vcpkg install openssl:x64-windows-static-md

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Cache Theseus Postgresql Installation
        uses: actions/cache@v6
        with:
          path: ~/.theseus/postgresql
          key: ${{ runner.os }}-theseus-postgresql-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Check
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" # for embedded postgresql
        run: cargo check
      - name: Clippy
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" # for embedded postgresql
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  ci:
    needs:
      - check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/maximize-build-space

      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            non_md_changes:
              - '!**/*.md'

      - name: Cache Theseus Postgresql Installation
        uses: actions/cache@v6
        with:
          path: ~/.theseus/postgresql
          key: ${{ runner.os }}-theseus-postgresql-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt --check

      - name: Start minio
        run: |
          docker compose -f etc/deploy/compose/compose-minio.yaml up -d --wait

      - name: Create tmp dir
        run: |
          sudo mkdir /mnt/trustify
          sudo chmod a+rwx /mnt/trustify

      - name: Test
        if: steps.filter.outputs.non_md_changes == 'true'
        run: cargo test --all-features
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" # for embedded postgresql
          RUST_LOG: info,sqlx=error,sea_orm=error
          TRUSTIFY_S3_AWS_REGION: eu-west-1
          TRUSTIFY_S3_AWS_BUCKET: guacsec-migration-dumps
          TMPDIR: /mnt/trustify

      - name: Export and Validate Generated Openapi Spec
        run: |
          cargo xtask openapi
          if ! git diff --quiet; then
              echo "::error::Uncommitted changes (run 'cargo xtask openapi' after making api changes)"
              exit 1
          fi
      - name: Ensure schemas are up-to-date
        run: |
          cargo xtask generate-schemas
          if ! git diff --quiet; then
              echo "::error::Uncommitted changes (run 'cargo xtask generate-schemas' after making changes to the models)"
              exit 1
          fi
      - name: Check the docs
        run: |
          cd docs/book
          npm ci
          make all

  container:
    needs:
      - check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/maximize-build-space
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: container

      - name: Build binaries
        run: cargo build --bin trustd --bin xtask --no-default-features --release

      - name: Stage binaries for container build
        run: |
          VERSION=ci
          TARGET=x86_64-unknown-linux-gnu

          for bin in trustd xtask; do
            DIR="${bin}-${VERSION}-${TARGET}"
            mkdir -p "download/${bin}-${TARGET}"
            mkdir -p "pack/${DIR}"
            cp "target/release/${bin}" "pack/${DIR}/${bin}"
            cp LICENSE "pack/${DIR}/"
            tar -C pack -czvf "download/${bin}-${TARGET}/${DIR}.tar.gz" "${DIR}"
          done

      - name: Build and smoke test containers
        uses: ./.github/actions/build-container
        with:
          image_tag: ci
          platforms: linux/amd64
          build_gensbom: 'false'

      - name: Scan trustd container for vulnerabilities
        uses: anchore/scan-action@v7
        id: scan-trustd
        with:
          image: docker-archive:trustd.tar
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: trustd-grype.sarif

      - name: Print trustd vulnerabilities
        if: always() && steps.scan-trustd.outcome == 'success'
        run: |
          jq -r '
            .runs[].results[] |
            "\(.level // "warning") \(.locations[0].physicalLocation.artifactLocation.uri // "unknown")  \(.message.text)"
          ' trustd-grype.sarif | sort | head -100

      - name: Scan xtask container for vulnerabilities
        uses: anchore/scan-action@v7
        id: scan-xtask
        with:
          image: docker-archive:xtask.tar
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: xtask-grype.sarif

      - name: Print xtask vulnerabilities
        if: always() && steps.scan-xtask.outcome == 'success'
        run: |
          jq -r '
            .runs[].results[] |
            "\(.level // "warning") \(.locations[0].physicalLocation.artifactLocation.uri // "unknown")  \(.message.text)"
          ' xtask-grype.sarif | sort | head -100

      - name: Upload trustd scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trustd-grype.sarif
          category: grype-trustd

      - name: Upload xtask scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: xtask-grype.sarif
          category: grype-xtask
